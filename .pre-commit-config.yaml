# Pre-commit hooks for code quality
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files
#
# Ruff handles linting, import sorting (isort), and formatting (black).
# No need for separate black/isort hooks — one tool, zero conflicts.

repos:
  # Ruff - Fast Python linter + formatter (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff
        name: ruff check (lint + isort)
        args: ["--fix"]
        files: ^src/
      - id: ruff-format
        name: ruff format
        files: ^src/

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: ["--fix", "--config", ".markdownlint.json"]
        files: \.(md|markdown)$
        exclude: ^\.planning/

  # Built-in pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"] # Allow custom YAML tags
        exclude: '^(deploy/helm|packages/helm-charts)/.*/templates/.*\.yaml$' # Exclude Helm templates
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  # Import boundary enforcement
  - repo: local
    hooks:
      - id: enterprise-import-boundary
        name: enforce core -> enterprise boundary
        entry: python3 tools/check_enterprise_imports.py
        language: system
        pass_filenames: false
        files: ^src/mcp_hangar/.*\.py$

  # Pytest check (optional - runs fast tests)
  # Uncomment if you want tests to run on commit
  # - repo: local
