name: CI - Operator

on:
  push:
    branches: [main]
    paths:
      - 'packages/operator/**'
      - '.github/workflows/ci-operator.yml'
  pull_request:
    paths:
      - 'packages/operator/**'
      - '.github/workflows/ci-operator.yml'

defaults:
  run:
    working-directory: packages/operator

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if operator directory exists
        id: check
        run: |
          if [ ! -d "packages/operator" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ${{ github.workspace }}

      - name: Set up Go
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: packages/operator/go.sum

      - name: golangci-lint
        if: steps.check.outputs.skip != 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: packages/operator
          version: v1.61
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if operator directory exists
        id: check
        run: |
          if [ ! -d "packages/operator" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ${{ github.workspace }}

      - name: Set up Go
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: packages/operator/go.sum

      - name: Run tests
        if: steps.check.outputs.skip != 'true'
        run: make test

      - name: Upload coverage
        if: steps.check.outputs.skip != 'true'
        uses: codecov/codecov-action@v4
        with:
          files: packages/operator/coverage.out
          flags: operator
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Check if operator directory exists
        id: check
        run: |
          if [ ! -d "packages/operator" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ${{ github.workspace }}

      - name: Set up Go
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: packages/operator/go.sum

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: make build

  # Docker job disabled - requires organization package write permissions
  # Uncomment when permissions are configured in GitHub settings
  # docker:
  #   runs-on: ubuntu-latest
  #   needs: [lint, test]
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'

  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Set up Docker Buildx
  #       uses: docker/setup-buildx-action@v3

  #     - name: Login to GHCR
  #       uses: docker/login-action@v3
  #       with:
  #         registry: ghcr.io
  #         username: ${{ github.actor }}
  #         password: ${{ secrets.GITHUB_TOKEN }}

  #     - name: Build and push
  #       uses: docker/build-push-action@v5
  #       with:
  #         context: packages/operator
  #         push: true
  #         tags: |
  #           ghcr.io/${{ github.repository }}-operator:latest
  #           ghcr.io/${{ github.repository }}-operator:${{ github.sha }}
  #         cache-from: type=gha
  #         cache-to: type=gha,mode=max

  generate-crds:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Check if operator directory exists
        id: check
        run: |
          if [ ! -d "packages/operator" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ${{ github.workspace }}

      - name: Set up Go
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: packages/operator/go.sum

      - name: Generate manifests
        if: steps.check.outputs.skip != 'true'
        run: make manifests

      - name: Check for changes
        if: steps.check.outputs.skip != 'true'
        run: |
          git diff --exit-code config/crd/bases/ || \
            (echo "CRDs out of sync. Run 'make manifests' and commit." && exit 1)
