name: CI - Core

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "enterprise/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci-core.yml"
  pull_request:
    paths:
      - "src/**"
      - "enterprise/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci-core.yml"

env:
  RUFF_VERSION: "0.14.13"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff==${{ env.RUFF_VERSION }}
          pip install -e ".[dev]"

      - name: Ruff check (lint + isort)
        run: ruff check src/mcp_hangar

      - name: Ruff format check
        run: ruff format --check src/mcp_hangar

      - name: Type check
        run: mypy src/mcp_hangar

      - name: Enterprise import boundary check
        run: bash scripts/check_enterprise_boundary.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=mcp_hangar --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: core
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --timeout=60

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hatch
        run: pip install hatch

      - name: Build package
        run: hatch build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: dist/
