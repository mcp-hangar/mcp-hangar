# MkDocs configuration for MCP Hangar documentation
# Deployed automatically to GitHub Pages on push to main

site_name: MCP Hangar
site_description: Production-grade hot-load registry for MCP providers
site_url: https://mcp-hangar.io
repo_url: https://github.com/mcp-hangar/mcp-hangar
repo_name: mcp-hangar/mcp-hangar
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Cookbook:
      - Overview: cookbook/index.md
      - 01 -- HTTP Gateway: cookbook/01-http-gateway.md
      - 02 -- Health Checks: cookbook/02-health-checks.md
      - 03 -- Circuit Breaker: cookbook/03-circuit-breaker.md
      - 04 -- Failover: cookbook/04-failover.md
      - 05 -- Load Balancing: cookbook/05-load-balancing.md
      - 06 -- Rate Limiting: cookbook/06-rate-limiting.md
      - 07 -- Observability Metrics: cookbook/07-observability-metrics.md
      - 08 -- Observability Langfuse: cookbook/08-observability-langfuse.md
      - 09 -- Subprocess Providers: cookbook/09-subprocess-providers.md
      - 10 -- Discovery Docker: cookbook/10-discovery-docker.md
      - 11 -- Discovery Kubernetes: cookbook/11-discovery-kubernetes.md
      - 12 -- Auth and RBAC: cookbook/12-auth-rbac.md
      - 13 -- Production Checklist: cookbook/13-production-checklist.md
  - Architecture:
      - Overview: architecture/OVERVIEW.md
      - Event Sourcing: architecture/EVENT_SOURCING.md
      - ADRs:
          - ADR-001 Langfuse Integration: adr/001-langfuse-integration.md
  - Guides:
      - Testing: guides/TESTING.md
      - Containers: guides/CONTAINERS.md
      - Discovery: guides/DISCOVERY.md
      - HTTP Transport: guides/HTTP_TRANSPORT.md
      - Batch Invocations: guides/BATCH_INVOCATIONS.md
      - Observability: guides/OBSERVABILITY.md
      - Authentication: guides/AUTHENTICATION.md
      - Kubernetes: guides/KUBERNETES.md
      - Provider Groups: guides/PROVIDER_GROUPS.md
      - Facade API: guides/FACADE_API.md
      - REST API: guides/REST_API.md
      - Dashboard UI: guides/DASHBOARD.md
      - Log Streaming: guides/LOG_STREAMING.md
      - WebSockets: guides/WEBSOCKETS.md
  - Observability:
      - OpenTelemetry Integrations: observability/otel-integrations.md
  - Development:
      - Contributing: development/CONTRIBUTING.md
      - Release Process: runbooks/RELEASE.md
  - Reference:
      - CLI: reference/cli.md
      - Configuration: reference/configuration.md
      - REST API: reference/rest-api.md
      - MCP Tools: reference/tools.md
      - Hot-Reload: reference/hot-reload.md
      - Changelog: changelog.md
      - Security: security.md
      - Auth Security Audit: security/AUTH_SECURITY_AUDIT.md
      - Code of Conduct: code-of-conduct.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mcp-hangar/mcp-hangar
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mcp-hangar/
